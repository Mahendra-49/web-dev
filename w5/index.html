    <script>
        // async await is syntatic sugar of .then
       async function rescent(){
         console.log("before sending request");
            const response= await fetch("https://jsonplaceholder.typicode.com/posts/1");
            const data=await response.json();
            console.log(data);
            console.log("request has been processed")

            
            document.getElementById("posts").innerHTML=data.body

        }

         async function rescent(){
            console.log("before sending request");
             await fetch("https://jsonplaceholder.typicode.com/posts/1")
             .then(function(response){
                response.json().then(
                    function(data){
                        console.log(data)
                        console.log("request has been processed")
                         document.getElementById("posts").innerHTML=data.body
                    })

             })          


        }

        //axios and display all element in arrary format when click on button
        async function getresecentpost() {
            const response=await axios.get("https://jsonplaceholder.typicode.com/posts")
            const arr=response.data;

            for(let i=0;i<arr.length;i++){
                document.getElementById("posts").innerHTML+=("<div>"+arr[i].title+"</div>");
            }
            
        }
